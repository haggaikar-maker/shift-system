{% extends "base.html" %}
{% block title %}הוספת משתמש{% endblock %}

{% block content %}
<section class="card auth-card wide-card">
    <h1>הוספת משתמש חדש</h1>
    <p class="subtitle">יצירת משתמש חדש עם תפקיד והרשאות</p>

    {% if error %}
    <div class="error-box">{{ error }}</div>
    {% endif %}

    <form method="post" action="/admin/users/new" class="form-grid two-cols-form">
        <div>
            <label>שם מלא</label>
            <input type="text" name="full_name" required>
        </div>

        <div>
            <label>שם משתמש</label>
            <input type="text" name="username" required>
        </div>

        <div>
            <label>אימייל</label>
            <input type="email" name="email" required>
        </div>

        <div>
            <label>טלפון</label>
            <input type="text" name="phone" required>
        </div>

        <div>
            <label>סיסמה</label>
            <input type="password" name="password" required>
        </div>

        <div>
            <label>תפקיד</label>
            <select name="role">
                {% for role in role_options %}
                <option value="{{ role }}">{{ role }}</option>
                {% endfor %}
            </select>
        </div>

        <div>
            <label>מינימום שיבוצים לשבוע</label>
            <input type="number" name="min_shifts_per_week" min="0" value="0" required>
        </div>

        <div>
            <label>מקסימום שיבוצים לשבוע</label>
            <input type="number" name="max_shifts_per_week" min="0" value="5" required>
        </div>

        <div>
            <label>מרווח מינימלי בין משמרות (שעות)</label>
            <input type="number" name="min_gap_hours" min="0" value="12" required>
        </div>

        <div>
            <label class="checkbox-row">
                <input type="checkbox" name="is_schedulable" checked>
                המשתמש משתתף בשיבוצים
            </label>
        </div>

        <div class="full-row">
            <button type="submit">צור משתמש</button>
        </div>
    </form>
</section>
{% endblock %}
